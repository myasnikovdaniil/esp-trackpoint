; PlatformIO project config — ESP32-C6 + ESP-IDF
;
; NOTE: the official `espressif32` platform does NOT build for the ESP32-C6.
; We use the community pioarduino fork, which packages a recent ESP-IDF (5.3+)
; with full C6 support and works with `framework = espidf`.
; If `stable` ever breaks, pin a tagged release from:
;   https://github.com/pioarduino/platform-espressif32/releases

[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = espidf
monitor_speed = 115200

; USB-Serial-JTAG (native USB port) usually enumerates as /dev/ttyACM*.
; Uncomment and set if auto-detection picks the wrong port:
; upload_port = /dev/ttyACM0
; monitor_port = /dev/ttyACM0
